# Naipes Backend - Nginx Configuration
# 서버: 64.225.63.155
# 포트: 3001
# 파일 위치: /etc/nginx/sites-available/naipes-backend

# Upstream 설정 (백엔드 서버)
upstream naipes_backend {
    server localhost:3001;
    keepalive 64;
}

# HTTP 서버 (포트 80 또는 IP 기반)
server {
    listen 80;
    server_name 64.225.63.155;  # 도메인이 있으면 변경 (예: api.naipes.com)

    # 로그 파일
    access_log /var/log/nginx/naipes-backend-access.log;
    error_log /var/log/nginx/naipes-backend-error.log;

    # 최대 업로드 파일 크기
    client_max_body_size 10M;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # API 프록시
    location /api {
        proxy_pass http://naipes_backend;
        proxy_http_version 1.1;

        # 헤더 설정
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 캐시 설정
        proxy_cache_bypass $http_upgrade;

        # 타임아웃 설정
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket 지원 (Socket.IO)
    location /socket.io {
        proxy_pass http://naipes_backend;
        proxy_http_version 1.1;

        # WebSocket 헤더
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 타임아웃 (24시간)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 정적 파일 - 업로드된 이미지
    location /uploads {
        alias /var/www/naipes-backend/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check (로그 없음)
    location /health {
        proxy_pass http://naipes_backend;
        access_log off;
    }

    # 기본 루트 (선택사항)
    location / {
        proxy_pass http://naipes_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Rate Limiting (DDoS 방어)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req zone=api_limit burst=200 nodelay;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

